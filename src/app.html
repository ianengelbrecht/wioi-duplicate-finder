<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tauri + SvelteKit App</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">
      %sveltekit.body%
      <div
        id="app-mounting-loader"
        style="
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          background-color: #f8fafc;
          z-index: 9999;
          font-family:
            system-ui,
            -apple-system,
            BlinkMacSystemFont,
            &quot;Segoe UI&quot;,
            Roboto,
            sans-serif;
        "
      >
        <div
          style="
            width: 48px;
            height: 48px;
            border: 4px solid #cbd5e1;
            border-top: 4px solid #0f172a;
            border-radius: 50%;
            animation: initial-spin 0.8s linear infinite;
          "
        ></div>
        <h1
          style="
            margin-top: 20px;
            font-size: 15px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 4px;
          "
        >
          RHOIO Duplicate Finder
        </h1>
        <p
          style="
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0;
          "
        >
          Initializing application...
        </p>
        <style>
          @keyframes initial-spin {
            0% {
              transform: rotate(0deg);
            }
            100% {
              transform: rotate(360deg);
            }
          }
        </style>
      </div>
    </div>
  </body>
</html>
